spring:
  application:
    # 固定死，不要动
    name: data-platform-query

  config:
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-redis.yml
      - optional:classpath:application-db.yml
      - optional:classpath:application-rabbitmq.yml

  profiles:
    active: dev

server:
  servlet:
    context-path: ${SERVLET_CONTEXT_PATH:/dp-query}
