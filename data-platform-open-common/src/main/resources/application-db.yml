spring:
  datasource:
    dynamic:
      strict: true
      primary: data_platform
      datasource:
        data_platform:
          url: ${DB_URL:jdbc:mysql://mysql:3306/data_platform}
          username: ${DB_USERNAME:root}
          password: ${DB_PASSWORD:}
          driver-class-name: ${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
          type: com.zaxxer.hikari.HikariDataSource
          hikari:
            minimum-idle: 10 # 最小空闲连接数
            maximum-pool-size: 50 # 最大连接数
            connection-timeout: 10000 # 连接超时时间
            idle-timeout: 10000 # 空闲连接超时时间
            max-lifetime: 1800000 # 连接最大生命周期
            validation-timeout: 3000 # 连接校验超时时间
            connection-test-query: SELECT 1 # 连接校验查询语句
            connection-init-sql: SELECT 1
            keepalive-time: 30000
      aop:
        enabled: true
